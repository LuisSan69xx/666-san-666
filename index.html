<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>0x666_VOID</title>
    
    <!-- Fuente Gótica Estilizada -->
    <link href="https://fonts.googleapis.com/css2?family=UnifrakturCook:wght@700&display=swap" rel="stylesheet">

    <style>
        :root {
            --red: #ff0000;
            --cyan: #00ffff;
            --white: #ffffff;
            --black: #000000;
        }

        body {
            background-color: var(--black);
            background-image: radial-gradient(circle, #1a0000 0%, #000000 100%);
            margin: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            font-family: 'UnifrakturCook', serif;
        }

        /* Botón de Entrada */
        .gate-btn {
            background: transparent;
            color: #8b0000;
            border: 1px solid #440000;
            padding: 15px 40px;
            font-size: 1.8rem;
            cursor: pointer;
            transition: all 0.3s;
            letter-spacing: 5px;
            z-index: 100;
            font-family: 'UnifrakturCook', serif;
        }

        .gate-btn:hover {
            color: var(--red);
            border-color: var(--red);
            box-shadow: 0 0 20px #8b0000;
        }

        #horror-screen {
            display: none;
            position: relative;
            text-align: center;
        }

        /* Texto Glitch: san666null-errorX */
        .glitch-text {
            position: relative;
            font-size: 6rem;
            font-weight: 400;
            color: var(--white);
            letter-spacing: 1px;
            margin: 0;
            line-height: 1.2;
        }

        .glitch-text::before,
        .glitch-text::after {
            content: "san666null-errorX";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--black);
        }

        /* Capas RGB Split */
        .glitch-text::before {
            left: 2px;
            text-shadow: -2px 0 var(--red);
            clip-path: rect(44px, 450px, 56px, 0);
            animation: glitch-anim-1 1s infinite linear alternate-reverse;
        }

        .glitch-text::after {
            left: -2px;
            text-shadow: -2px 0 var(--cyan);
            clip-path: rect(10px, 450px, 30px, 0);
            animation: glitch-anim-2 0.8s infinite linear alternate-reverse;
        }

        @keyframes glitch-anim-1 {
            0% { clip-path: inset(20% 0 30% 0); }
            20% { clip-path: inset(60% 0 10% 0); }
            40% { clip-path: inset(40% 0 50% 0); }
            60% { clip-path: inset(80% 0 5% 0); }
            80% { clip-path: inset(10% 0 70% 0); }
            100% { clip-path: inset(30% 0 20% 0); }
        }

        @keyframes glitch-anim-2 {
            0% { clip-path: inset(15% 0 65% 0); }
            25% { clip-path: inset(45% 0 15% 0); }
            50% { clip-path: inset(5% 0 85% 0); }
            75% { clip-path: inset(75% 0 5% 0); }
            100% { clip-path: inset(25% 0 35% 0); }
        }

        .sub-msg {
            font-family: monospace;
            font-size: 0.8rem;
            color: var(--red);
            margin-top: 15px;
            opacity: 0.5;
            letter-spacing: 10px;
            text-transform: uppercase;
        }

        .overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://media.giphy.com/media/oEI9uWUqnW3Fe/giphy.gif');
            opacity: 0.04;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div class="overlay"></div>

    <button id="entry-point" class="gate-btn">[ ADTRATE ]</button>

    <div id="horror-screen">
        <h1 class="glitch-text">san666null-errorX</h1>
        <div class="sub-msg">_terminal_void_access_</div>
    </div>

    <!-- Tu archivo de audio m4a -->
    <audio id="sfx" src="audio.m4a"></audio>

    <script>
        const btn = document.getElementById('entry-point');
        const screen = document.getElementById('horror-screen');
        const audio = document.getElementById('sfx');

        btn.addEventListener('click', () => {
            btn.style.display = 'none';
            screen.style.display = 'block';
            
            // VOLUMEN ACTUALIZADO A 0.4 (40%)
            audio.volume = 0.4; 
            audio.play();

            // Redirección rápida tras 3 segundos
            setTimeout(() => {
                window.location.href = "https://youtube.com/@luissan_?si=DUqL25hpxwWneX4P";
            }, 3000); 
        });
    </script>
</body>
</html>
